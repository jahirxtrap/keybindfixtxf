name: Publish to Maven Central

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to local staging
        run: |
          chmod +x gradlew
          export GPG_PRIVATE_KEY=$(echo "$GPG_PRIVATE_KEY_BASE64" | base64 -d)
          ./gradlew publish
        env:
          GPG_PRIVATE_KEY_BASE64: ${{ vars.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ vars.GPG_PASSPHRASE }}

      - name: Upload to Maven Central
        run: |
          cd build/staging-deploy
          zip -r bundle.zip .
          curl --fail \
            -u "${{ vars.MAVEN_USERNAME }}:${{ vars.MAVEN_PASSWORD }}" \
            -F "bundle=@bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"
